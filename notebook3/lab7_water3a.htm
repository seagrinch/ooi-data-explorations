<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Masses Activity #3a - Temperature Salinity Diagram</title>
    <link rel="stylesheet" type="text/css" href="../css/bootstrap.min.css">
    <script src="https://cdn.plot.ly/plotly-3.0.1.min.js"></script>
</head>
<body>
    <div style="width: 800px; margin: 10px">
        <div id="plot" style="width:800px; height: 600px;"></div>
        <div class="row">
            <div class="col-md-6 text-right">
                <p>Click on the graph to add and remove your own dots.</p>
            </div>
            <div class="col-md-6 text-left">
                <button id="clear-dots">Clear All Dots</button>
            </div>
        </div>
        <p class="text-right"><small>&copy; 2025 Rutgers University <a href="https://datalab.marine.rutgers.edu">OOI Ocean Data Labs Project</a></small></p>
    </div>
    <script>
        // Ocean Data Labs: OOI Lab Manual Widgets - 2025 Edition
        // Design by Sage Lichtenwalner, 1/27/2025
        
        fetch('data/lab7_ts_diagram.json')
            .then(response => response.json())
            .then(data => {
                const trace = {
                    x: data.salinity,
                    y: data.temperature,
                    z: data.density,
                    type: 'contour',
                    contours: {
                        coloring: 'heatmap',
                        showlabels: true
                    },
                    colorscale: 'YlGnBu',
                    reversescale: true,
                    colorbar: {
                        title: {
                            text: 'Density (kg/m³)',
                            side: 'right',
                            font: {size: 16}
                        }
                    },
                    hoverinfo: 'none',
                };

                const layout = {
                    title: {text: 'Temperature Salinity Diagram', font:{size: 24}},
                    xaxis: { 
                        title: {text: 'Salinity (PSU)', font: {size: 16}},
                        tickfont: {size: 14},
                        dtick: 1, // Major ticks
                        showgrid: true,
                        gridcolor: 'black',
                        gridwidth: 1,
                        ticklabelposition: 'inside right',
                        ticks: '',
                        layer: 'above traces',
                        minor: {
                            showgrid: true,
                            gridcolor: 'lightgrey',
                            gridwidth: 0.5,
                            dtick: 0.25 // Minor ticks
                        },
                    },
                    yaxis: { 
                        title: {text: 'Temperature (°C)', font: {size: 16}},
                        tickfont: {size: 14},
                        dtick: 5, // Major ticks
                        showgrid: true,
                        gridcolor: 'black',
                        gridwidth: 1,
                        ticklabelposition: 'inside top',
                        ticks: '',
                        layer: 'above traces',
                        minor: {
                            showgrid: true,
                            gridcolor: 'lightgrey',
                            gridwidth: 0.5,
                            dtick: 1 // Minor ticks
                        }
                    },
                    hoverdistance: 1,
                    margin: {t: 50, b: 50, l: 50, r: 50},
                };

                Plotly.newPlot('plot', [trace], layout);

                const minSal = Math.min(...data.salinity);
                const minTemp = Math.min(...data.temperature);

                const dots = {
                    x: [],
                    y: [],
                    mode: 'lines+markers',
                    type: 'scatter',
                    marker: {color: 'red', size: 12, line: {width: 2, color: 'black'}},
                    hovertemplate: 
                        'Salinity: %{x} PSU<br>' +
                        'Temperature: %{y} °C<br>' +
                        'Density: %{customdata} kg/m³<extra></extra>', // Custom hover labels
                    customdata: [], // Placeholder for density values
                };

                Plotly.addTraces('plot', dots);

                // Hover crosshair helpers
                function updateHoverCrosshair(x, y) {
                  Plotly.relayout('plot', {
                    shapes: [
                      { // horizontal to y-axis
                        type: 'line',
                        x0: minSal,
                        x1: x,
                        y0: y,
                        y1: y,
                        line: {color: 'red', width: 1, dash: 'dot'}
                      },
                      { // vertical to x-axis
                        type: 'line',
                        x0: x,
                        x1: x,
                        y0: minTemp,
                        y1: y,
                        line: {color: 'red', width: 1, dash: 'dot'}
                      }
                    ]
                  });
                }
                function removeHoverCrosshair() {
                  Plotly.relayout('plot', {shapes: []});
                }

                document.getElementById('plot').on('plotly_hover', function(evt) {
                  const p = evt.points[0];
                  updateHoverCrosshair(p.x, p.y);
                });
                document.getElementById('plot').on('plotly_unhover', function() {
                  removeHoverCrosshair();
                });

                document.getElementById('plot').on('plotly_click', function(dataClick) {
                    const point = dataClick.points[0];
                    const x = point.x;
                    const y = point.y;

                    const existingIndex = dots.x.findIndex((px, i) => px === x && dots.y[i] === y);

                    if (existingIndex === -1) {
                        dots.x.push(x);
                        dots.y.push(y);

                        // Retrieve density value from the z data of the contour plot
                        const density = getDensityFromContour(dataClick.points[0]);
                        dots.customdata.push(density);
                    } else {
                        dots.x.splice(existingIndex, 1);
                        dots.y.splice(existingIndex, 1);
                        dots.customdata.splice(existingIndex, 1);
                    }
                    console.log(dots);

                    Plotly.redraw('plot'); // preserves current hover crosshair until unhover
                });

                function getDensityFromContour(point) {
                    // Example logic to retrieve density from the contour plot
                    const xIndex = data.salinity.findIndex(s => s === point.x);
                    const yIndex = data.temperature.findIndex(t => t === point.y);
                    if (xIndex !== -1 && yIndex !== -1) {
                        return data.density[yIndex][xIndex].toFixed(2); // Assuming density is a 2D array
                    }
                    return 'N/A';
                }

                document.getElementById('clear-dots').addEventListener('click', function() {
                    dots.x = [];
                    dots.y = [];
                    dots.customdata = [];
                    Plotly.update('plot', {x: [dots.x], y: [dots.y], customdata: [dots.customdata]}, {}, [1]);
                });
            });
    </script>
</body>
</html>
