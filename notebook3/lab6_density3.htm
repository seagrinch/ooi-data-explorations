<!DOCTYPE html>
<meta charset="utf-8">

<html>
  <head>
    <title>Density Lab Activity #3</title>
    <style format="text/css">
      body {
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        font-size: 12px;
      }
      h3 {
        margin: 0px;
        color: #494949;
        font-size: 16px;
      }
      small {
        color: #808080;
      }
      .myCircle:hover {
        opacity: 1;
      }
    </style>
  </head>

  <body>
    <div style="width: 800px; margin: 10px">
      <div id="chart"></div>
      <div style="margin: 14px;" align="center" class="form-inline">
        <label>Select a Site: <select id="selectSite" class="form-control"></select></label>
      </div>
      <p class="text-center"><small>&copy; 2025 Rutgers University <a href="https://datalab.marine.rutgers.edu">OOI Ocean Data Labs Project</a></small></p>
    </div>
  </body>

<link rel="stylesheet" type="text/css" href="../css/bootstrap.min.css">

<!-- Load d3.js -->
<script src="https://d3js.org/d3.v4.js"></script>
<script src="https://d3js.org/d3-scale-chromatic.v1.min.js"></script>
<script src="https://d3js.org/d3-format.v1.min.js"></script>

<script>
// Ocean Data Labs: OOI Lab Manual Widgets - 2025 Edition
// Design by Sage Lichtenwalner, 1/16/2025
//
// References:
// https://www.d3-graph-gallery.com/graph/line_filter.html

// Setup initial SVG
var svg = d3.select("#chart").append("svg")
      .attr("width",800)
      .attr("height",500);

// Specify coordinates for each graph
var margin1 = {top: 24, right: 540, bottom: 40, left: 40},
    margin2 = {top: 24, right: 280, bottom: 40, left: 300},
    margin3 = {top: 24, right: 20, bottom: 40, left: 560},
    width1 = +svg.attr("width") - margin1.left - margin1.right,
    width2 = +svg.attr("width") - margin2.left - margin2.right,
    width3 = +svg.attr("width") - margin3.left - margin3.right,
    height1 = +svg.attr("height") - margin1.top - margin1.bottom,
    height2 = +svg.attr("height") - margin2.top - margin2.bottom,
    height3 = +svg.attr("height") - margin3.top - margin3.bottom;

var graph1 = svg.append("g")
    .attr("class", "focus")
    .attr("transform", "translate(" + margin1.left + "," + margin1.top + ")");
var graph2 = svg.append("g")
    .attr("class", "focus")
    .attr("transform", "translate(" + margin2.left + "," + margin2.top + ")");
var graph3 = svg.append("g")
    .attr("class", "focus")
    .attr("transform", "translate(" + margin3.left + "," + margin3.top + ")");

svg.append("defs").append("clipPath")
    .attr("id", "clip")
  .append("rect")
    .attr("width", width1)
    .attr("height", height1);

// Add the grey background that makes ggplot2 famous
graph1.append("rect")
    .attr("x",0)
    .attr("y",0)
    .attr("height", height1)
    .attr("width", width1)
    .style("fill", "#EBEBEB")
graph2.append("rect")
    .attr("x",0)
    .attr("y",0)
    .attr("height", height2)
    .attr("width", width2)
    .style("fill", "#EBEBEB")
graph3.append("rect")
    .attr("x",0)
    .attr("y",0)
    .attr("height", height3)
    .attr("width", width3)
    .style("fill", "#EBEBEB")

function parseData(d){
  return {
    pressure_bin: +d.depth_bin,
    seawater_temperature: +d.temperature,
    practical_salinity: +d.salinity,
    density: +d.density,
    site: d.site,
    date: d.date,
  }
}

//Read the data
d3.csv("data/lab6_profiles.csv", parseData, function(data) {
  // Filter out blank values
  data = data.filter(d => d.pressure_bin && d.seawater_temperature && d.practical_salinity && d.density);
  
  // Setup selector options
  var siteNames = [
    {'id':'CP', 'title':'Coastal Pioneer', 'titleLong':'Coastal Pioneer NES: Offshore Profiler Mooring'},
    {'id':'GI', 'title':'Global Irminger', 'titleLong':'Global Irminger Sea: Apex Profiler Mooring'}
  ];
  var dateNames = [
    {'id':'2020-08-31','title':'August 31, 2020', 'color':'#1f77b4', 'short':'8/31'},
    {'id':'2021-01-31','title':'January 31, 2021', 'color':'#d62728', 'short':'1/31'}
  ];

  // Add options to site selector only
  d3.select("#selectSite")
    .selectAll('myOptions')
    .data(siteNames)
    .enter()
    .append('option')
    .text(function (d) { return d.title; })
    .attr("value", function (d) { return d.id; })

  // Initialize the axes
  var x1 = d3.scaleLinear().range([ 0, width1 ])
  var x2 = d3.scaleLinear().range([ 0, width2 ])
  var x3 = d3.scaleLinear().range([ 0, width3 ])
  var y = d3.scaleLinear().range([ 0, height1 ]) // Flip axis

  var xAxis1 = d3.axisBottom().scale(x1).ticks(5)
  var xAxis2 = d3.axisBottom().scale(x2).ticks(5)
  var xAxis3 = d3.axisBottom().scale(x3).ticks(4,'f')
  var yAxis = d3.axisLeft().scale(y).ticks(7)

  graph1.append("g")
    .attr("transform", "translate(0," + height1 + ")")
    .attr("class","myXaxis1")
  graph2.append("g")
    .attr("transform", "translate(0," + height2 + ")")
    .attr("class","myXaxis2")
  graph3.append("g")
    .attr("transform", "translate(0," + height3 + ")")
    .attr("class","myXaxis3")
  graph1.append("g")
    .attr("class","myYaxis1")
  graph2.append("g")
    .attr("class","myYaxis2")
  graph3.append("g")
    .attr("class","myYaxis3")

  // Add labels
  xLabel1 = graph1.append("text")
      .attr("text-anchor", "middle")
      .attr("x", width1/2)
      .attr("y", height1 + 36)
      .text("Temperature (C)");
  xLabel2 = graph2.append("text")
      .attr("text-anchor", "middle")
      .attr("x", width2/2)
      .attr("y", height2 + 36)
      .text("Salinity (psu)");
  xLabel3 = graph3.append("text")
      .attr("text-anchor", "middle")
      .attr("x", width2/2)
      .attr("y", height2 + 36)
      .text("Density (kg/m³)");
  yLabel = graph1.append("text")
      .attr("text-anchor", "end")
      .attr("transform", "rotate(-90)")
      .attr("y", -30)
      .attr("x", 0)
      .text("Depth (m)")
  title2 = graph2.append("text")
      .attr("text-anchor", "middle")
      .attr("font-weight", "bold")
      .attr("font-size", "16px")
      .attr("x", width1/2)
      .attr("y", -10)
      .text("Site");

  // Remove single-line initialization; create line groups for each date
  var lineGroup1 = graph1.append('g');
  var lineGroup2 = graph2.append('g');
  var lineGroup3 = graph3.append('g');

  // Add legend to graph3 (top-right)
  var legend = graph3.append('g')
    .attr('class', 'legend')
    .attr('transform', 'translate(' + (width3 - 10) + ', 10)');

  dateNames.forEach(function(dateObj, i) {
    var legendRow = legend.append('g')
      .attr('transform', 'translate(0, ' + (i * 20) + ')');
    
    legendRow.append('rect')
      .attr('x', -12)
      .attr('width', 12)
      .attr('height', 12)
      .attr('fill', dateObj.color);
    
    legendRow.append('text')
      .attr('x', -18)
      .attr('y', 10)
      .attr('text-anchor', 'end')
      .style('font-size', '11px')
      .text(dateObj.title);
  });

  // This allows to find the closest index of the mouse
  var bisect = d3.bisector(function(d) { return d.pressure_bin; }).left;
  
  // Specify decimal format
  var f = d3.format(".2f");

  // Create focus circles and text for EACH date (2 per graph)
  var focus1_date1 = graph1.append('g').append('circle')
      .style("fill", dateNames[0].color)
      .attr("stroke", "black")
      .attr("stroke-width", 1)
      .attr('r', 6)
      .style("opacity", 0);
  var focus1_date2 = graph1.append('g').append('circle')
      .style("fill", dateNames[1].color)
      .attr("stroke", "black")
      .attr("stroke-width", 1)
      .attr('r', 6)
      .style("opacity", 0);

  var focus2_date1 = graph2.append('g').append('circle')
      .style("fill", dateNames[0].color)
      .attr("stroke", "black")
      .attr("stroke-width", 1)
      .attr('r', 6)
      .style("opacity", 0);
  var focus2_date2 = graph2.append('g').append('circle')
      .style("fill", dateNames[1].color)
      .attr("stroke", "black")
      .attr("stroke-width", 1)
      .attr('r', 6)
      .style("opacity", 0);

  var focus3_date1 = graph3.append('g').append('circle')
      .style("fill", dateNames[0].color)
      .attr("stroke", "black")
      .attr("stroke-width", 1)
      .attr('r', 6)
      .style("opacity", 0);
  var focus3_date2 = graph3.append('g').append('circle')
      .style("fill", dateNames[1].color)
      .attr("stroke", "black")
      .attr("stroke-width", 1)
      .attr('r', 6)
      .style("opacity", 0);

  // Create the text for each date
  var focusText1_date1 = graph1.append('g').append('text')
      .style("opacity", 0)
      .style("fill", dateNames[0].color)
      .attr("text-anchor", "start")
      .attr("alignment-baseline", "middle")
      .attr("x", 10).attr("y", height1-25);
  var focusText1_date2 = graph1.append('g').append('text')
      .style("opacity", 0)
      .style("fill", dateNames[1].color)
      .attr("text-anchor", "start")
      .attr("alignment-baseline", "middle")
      .attr("x", 10).attr("y", height1-10);
  var focusText1_depth = graph1.append('g').append('text')
      .style("opacity", 0)
      .style("fill", "black")
      .attr("text-anchor", "start")
      .attr("alignment-baseline", "middle")
      .attr("x", 10).attr("y", height1-40);

  var focusText2_date1 = graph2.append('g').append('text')
      .style("opacity", 0)
      .style("fill", dateNames[0].color)
      .attr("text-anchor", "start")
      .attr("alignment-baseline", "middle")
      .attr("x", 10).attr("y", height1-25);
  var focusText2_date2 = graph2.append('g').append('text')
      .style("opacity", 0)
      .style("fill", dateNames[1].color)
      .attr("text-anchor", "start")
      .attr("alignment-baseline", "middle")
      .attr("x", 10).attr("y", height1-10);
  var focusText2_depth = graph2.append('g').append('text')
      .style("opacity", 0)
      .style("fill", "black")
      .attr("text-anchor", "start")
      .attr("alignment-baseline", "middle")
      .attr("x", 10).attr("y", height1-40);

  var focusText3_date1 = graph3.append('g').append('text')
      .style("opacity", 0)
      .style("fill", dateNames[0].color)
      .attr("text-anchor", "start")
      .attr("alignment-baseline", "middle")
      .attr("x", 10).attr("y", height1-25);
  var focusText3_date2 = graph3.append('g').append('text')
      .style("opacity", 0)
      .style("fill", dateNames[1].color)
      .attr("text-anchor", "start")
      .attr("alignment-baseline", "middle")
      .attr("x", 10).attr("y", height1-10);
  var focusText3_depth = graph3.append('g').append('text')
      .style("opacity", 0)
      .style("fill", "black")
      .attr("text-anchor", "start")
      .attr("alignment-baseline", "middle")
      .attr("x", 10).attr("y", height1-40);

  // Create a rect on top of the svg area: this rectangle recovers mouse position
  var g1 = graph1
    .append('rect')
    .style("fill", "none")
    .style("pointer-events", "all")
    .attr('width', width1)
    .attr('height', height1)
  var g2 = graph2
    .append('rect')
    .style("fill", "none")
    .style("pointer-events", "all")
    .attr('width', width2)
    .attr('height', height2)
  var g3 = graph3
    .append('rect')
    .style("fill", "none")
    .style("pointer-events", "all")
    .attr('width', width3)
    .attr('height', height3)

  // Function to update graph with specified site
  function updateGraph(site) {
    var dataByDate = {};
    dateNames.forEach(function(dateObj) {
      dataByDate[dateObj.id] = data.filter(function(d){return d.site==site && d.date==dateObj.id});
    });

    x1.domain([3, 15]);
    x2.domain([32.5, 36]);
    x3.domain([1025, 1038]);
    var allSiteData = data.filter(d => d.site==site);
    y.domain([0, d3.max(allSiteData, function(d) { return d.pressure_bin }) ]);

    var t = d3.transition().duration(750);
    graph1.selectAll(".myXaxis1").transition(t).call(xAxis1);
    graph2.selectAll(".myXaxis2").transition(t).call(xAxis2);
    graph3.selectAll(".myXaxis3").transition(t).call(xAxis3);
    graph1.selectAll(".myYaxis1").transition(t).call(yAxis);
    graph2.selectAll(".myYaxis2").transition(t).call(yAxis);
    graph3.selectAll(".myYaxis3").transition(t).call(yAxis);

    // Clear old lines
    lineGroup1.selectAll("path").remove();
    lineGroup2.selectAll("path").remove();
    lineGroup3.selectAll("path").remove();

    // Draw line for each date
    dateNames.forEach(function(dateObj) {
      var ds = dataByDate[dateObj.id];
      lineGroup1.append("path")
        .datum(ds)
        .attr("fill", "none")
        .attr("stroke", dateObj.color)
        .attr("stroke-width", 3)
        .attr("d", d3.line()
          .x(function(d) { return x1(d.seawater_temperature) })
          .y(function(d) { return y(d.pressure_bin) })
        );
      lineGroup2.append("path")
        .datum(ds)
        .attr("fill", "none")
        .attr("stroke", dateObj.color)
        .attr("stroke-width", 3)
        .attr("d", d3.line()
          .x(function(d) { return x2(d.practical_salinity) })
          .y(function(d) { return y(d.pressure_bin) })
        );
      lineGroup3.append("path")
        .datum(ds)
        .attr("fill", "none")
        .attr("stroke", dateObj.color)
        .attr("stroke-width", 3)
        .attr("d", d3.line()
          .x(function(d) { return x3(d.density) })
          .y(function(d) { return y(d.pressure_bin) })
        );
    });

    // Conditionally adjust text anchor for graphs 1 and 3 based on site
    if (site === 'CP') {
      focusText1_date1.attr("text-anchor", "end").attr("x", width1 - 10);
      focusText1_date2.attr("text-anchor", "end").attr("x", width1 - 10);
      focusText1_depth.attr("text-anchor", "end").attr("x", width1 - 10);
      focusText3_date1.attr("text-anchor", "end").attr("x", width3 - 10);
      focusText3_date2.attr("text-anchor", "end").attr("x", width3 - 10);
      focusText3_depth.attr("text-anchor", "end").attr("x", width3 - 10);
    } else {
      focusText1_date1.attr("text-anchor", "start").attr("x", 10);
      focusText1_date2.attr("text-anchor", "start").attr("x", 10);
      focusText1_depth.attr("text-anchor", "start").attr("x", 10);
      focusText3_date1.attr("text-anchor", "start").attr("x", 10);
      focusText3_date2.attr("text-anchor", "start").attr("x", 10);
      focusText3_depth.attr("text-anchor", "start").attr("x", 10);
    }

    title2.text(siteNames.find(el => el.id==site).titleLong);

    g1
      .on('mouseover', mouseover)
      .on('mousemove', mousemove)
      .on('mouseout', mouseout);
    g2
      .on('mouseover', mouseover)
      .on('mousemove', mousemove)
      .on('mouseout', mouseout);
    g3
      .on('mouseover', mouseover)
      .on('mousemove', mousemove)
      .on('mouseout', mouseout);

    // What happens when the mouse move -> show the annotations at the right positions.
    function mouseover() {
      focus1_date1.style("opacity", 1); focus1_date2.style("opacity", 1);
      focusText1_date1.style("opacity",1); focusText1_date2.style("opacity",1);
      focusText1_depth.style("opacity",1);
      focus2_date1.style("opacity", 1); focus2_date2.style("opacity", 1);
      focusText2_date1.style("opacity",1); focusText2_date2.style("opacity",1);
      focusText2_depth.style("opacity",1);
      focus3_date1.style("opacity", 1); focus3_date2.style("opacity", 1);
      focusText3_date1.style("opacity",1); focusText3_date2.style("opacity",1);
      focusText3_depth.style("opacity",1);
    }
    function mousemove() {
      var y0 = y.invert(d3.mouse(this)[1]);
      var data_date1 = dataByDate[dateNames[0].id];
      var data_date2 = dataByDate[dateNames[1].id];
      var i1 = bisect(data_date1, y0);
      if (i1 >= data_date1.length) i1 = data_date1.length - 1;
      var i2 = bisect(data_date2, y0);
      if (i2 >= data_date2.length) i2 = data_date2.length - 1;
      var dp1 = data_date1[i1];
      var dp2 = data_date2[i2];

      focus1_date1.attr("cx", x1(dp1.seawater_temperature)).attr("cy", y(dp1.pressure_bin));
      focus1_date2.attr("cx", x1(dp2.seawater_temperature)).attr("cy", y(dp2.pressure_bin));
      focusText1_date1.html(dateNames[0].short + " " + f(dp1.seawater_temperature));
      focusText1_date2.html(dateNames[1].short + " " + f(dp2.seawater_temperature));
      focusText1_depth.html("" + f(dp1.pressure_bin) + "m");

      focus2_date1.attr("cx", x2(dp1.practical_salinity)).attr("cy", y(dp1.pressure_bin));
      focus2_date2.attr("cx", x2(dp2.practical_salinity)).attr("cy", y(dp2.pressure_bin));
      focusText2_date1.html(dateNames[0].short + " " + f(dp1.practical_salinity));
      focusText2_date2.html(dateNames[1].short + " " + f(dp2.practical_salinity));
      focusText2_depth.html("" + f(dp1.pressure_bin) + "m");

      focus3_date1.attr("cx", x3(dp1.density)).attr("cy", y(dp1.pressure_bin));
      focus3_date2.attr("cx", x3(dp2.density)).attr("cy", y(dp2.pressure_bin));
      focusText3_date1.html(dateNames[0].short + " " + f(dp1.density));
      focusText3_date2.html(dateNames[1].short + " " + f(dp2.density));
      focusText3_depth.html("" + f(dp1.pressure_bin) + "m");
    }
    function mouseout() {
      focus1_date1.style("opacity", 0); focus1_date2.style("opacity", 0);
      focusText1_date1.style("opacity", 0); focusText1_date2.style("opacity", 0);
      focusText1_depth.style("opacity", 0);
      focus2_date1.style("opacity", 0); focus2_date2.style("opacity", 0);
      focusText2_date1.style("opacity", 0); focusText2_date2.style("opacity", 0);
      focusText2_depth.style("opacity", 0);
      focus3_date1.style("opacity", 0); focus3_date2.style("opacity", 0);
      focusText3_date1.style("opacity", 0); focusText3_date2.style("opacity", 0);
      focusText3_depth.style("opacity", 0);
    }
  }

  updateGraph('CP');

  d3.select("#selectSite").on("change", function(d) {
    updateGraph(d3.select("#selectSite").property("value"));
  });
});
</script>

</html>
